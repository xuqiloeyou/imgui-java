# imgui-java 1.86.11 Android ARM64 专属编译脚本（最终修复版）
name: Android ARM64 Build (Only)
on:
  workflow_dispatch: # 仅手动触发，避免误执行

jobs:
  build-android-arm64:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取源码（强制官方1.86.11版本）
        uses: actions/checkout@v4
        with:
          repository: SpaiR/imgui-java
          ref: v1.86.11
          submodules: recursive
          fetch-depth: 0

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 配置Android NDK r25b
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
          add-to-path: true

      - name: 定义Android编译环境变量
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "TARGET_ARCH=arm64-v8a" >> $GITHUB_ENV
          echo "ANDROID_API=34" >> $GITHUB_ENV # 用34更稳定，兼容绝大多数Android设备
          echo "TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "TARGET_TRIPLE=aarch64-linux-android" >> $GITHUB_ENV

      - name: 配置CMake（仅Android ARM64，彻底屏蔽桌面端）
        run: |
          rm -rf build-android-arm64 && mkdir -p build-android-arm64
          cd build-android-arm64
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Android \
            -DCMAKE_SYSTEM_VERSION=${{ env.ANDROID_API }} \
            -DCMAKE_ANDROID_ARCH_ABI=${{ env.TARGET_ARCH }} \
            -DCMAKE_ANDROID_NDK=${{ env.ANDROID_NDK_HOME }} \
            -DCMAKE_ANDROID_STL_TYPE=c++_static \
            -DCMAKE_C_COMPILER=${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.ANDROID_API }}-clang \
            -DCMAKE_CXX_COMPILER=${{ env.TOOLCHAIN }}/bin/${{ env.TARGET_TRIPLE }}${{ env.ANDROID_API }}-clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DIMGUI_JAVA_BUILD_EXAMPLES=OFF \
            -DIMGUI_JAVA_BUILD_TESTS=OFF \
            -DIMGUI_JAVA_OPENGL_VERSION=GLES3 \
            -DIMGUI_JAVA_BUILD_DESKTOP=OFF # 关键！彻底关闭桌面端所有编译任务

      - name: 编译Android ARM64原生库
        run: |
          cd build-android-arm64
          make -j$(nproc)

      - name: 重命名并打包产物
        run: |
          # 重命名为veil模组可识别的文件名
          cp build-android-arm64/libimgui-java.so build-android-arm64/libimgui-java-arm64.so
          # 创建标准Android目录结构
          mkdir -p release/arm64-v8aarm64-v8a
          cp build-android-arm64/libimgui-java-arm64.so release/arm64-v8a/
          # 验证文件生成
          ls -la release/arm64-v8a/

      - name: 上传Android专属编译产物
        uses: actions/upload-artifact@v4
        with:
          name: imgui-java-1.86.11-android-arm64-v8a
          path: release/arm64-v8a/libimgui-java-arm64.so
